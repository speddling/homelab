name: Deploy Kubernetes Config

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Storage Engine
        run: |
          # Apply the config from the gh-runner workspace
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/local-path-config.yaml
          
          # Force the provisioner to restart and pick up the new config
          sudo k3s kubectl delete pod -n kube-system -l app=local-path-provisioner --ignore-not-found

      - name: Deploy Storage Classes
        run: |
          # Apply all storage classes in the directory
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/

      - name: Deploy Navidrome
        run: |
          # Apply the application manifests
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/apps/navidrome/

      - name: Verify Deployment Status
        run: |
          echo "--- PVC Status ---"
          sudo k3s kubectl get pvc
          echo "--- Pod Status ---"
          sudo k3s kubectl get pods