name: Deploy Kubernetes Config

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. PERMISSIONS: Update the engine to allow /mnt paths
      - name: Configure Storage Engine
        run: |
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/local-path-config.yaml
          sudo k3s kubectl delete pod -n kube-system -l app=local-path-provisioner --ignore-not-found

      # 2. CLEANUP: Wipe the 30-minute-old "Pending" resources
      - name: Clean Stale Resources
        run: |
          sudo k3s kubectl delete deployment navidrome --ignore-not-found
          sudo k3s kubectl delete pvc navidrome-db navidrome-music --ignore-not-found

      # 3. STORAGE: Apply the StorageClasses (tunes, fast, slow)
      - name: Deploy Storage Classes
        run: |
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/

      # 4. APPS: Re-deploy Navidrome (which creates fresh PVCs)
      - name: Deploy Navidrome
        run: |
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/apps/navidrome/

      # 5. FINAL CHECK
      - name: Verify Deployment
        run: |
          sudo k3s kubectl get pvc
          sudo k3s kubectl get pods