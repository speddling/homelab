name: Deploy Kubernetes Config

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Storage Engine
        run: |
          # 1. Apply the paths config (Idempotent)
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/local-path-config.yaml
          
          # 2. We only restart the provisioner if the config actually changed. 
          # Bouncing it every time can cause temporary volume detachments.
          # Removing the 'delete pod' unless you are specifically troubleshooting the provisioner itself.

      - name: Clean Stale Resources
        run: |
          # FIX: Removed 'delete pvc'. 
          # In a DevOps workflow, PVCs should be persistent lifecycle objects.
          # We only delete the deployment to ensure the new image/config is pulled.
          sudo k3s kubectl delete deployment navidrome --ignore-not-found

      - name: Deploy Storage Classes
        run: |
          # 3. Apply StorageClass definitions. 
          # If they exist and haven't changed, K8s will return "unchanged".
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/cluster/storage/

      - name: Deploy Navidrome
        run: |
          # 4. Re-apply Navidrome.
          # Because we didn't delete the PVCs in the 'Clean' step, 
          # K8s will bind the new Pods to the EXISTING persistent volumes.
          sudo k3s kubectl apply -f ${{ github.workspace }}/kubernetes/apps/navidrome/

      - name: Verify Deployment
        run: |
          echo "Checking volume binding status..."
          sudo k3s kubectl get pvc
          echo "Checking pod status..."
          sudo k3s kubectl get pods