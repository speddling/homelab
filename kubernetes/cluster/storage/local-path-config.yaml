apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: kube-system
data:
  config.json: |-
    {
      "nodePathMap": [
        {
          "node": "monolith",
          "paths": [
            # 1. Prioritize the HDD mount point to ensure it is selected first
            "/mnt/lab-backups/music-library",
            # 2. Secondary/Fallback paths (optional, consider removing to force failure if HDD is unmounted)
            "/mnt/k8s-worker",
            "/opt/local-path-provisioner"
          ]
        }
      ]
    }