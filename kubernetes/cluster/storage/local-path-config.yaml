apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: kube-system
data:
  config.json: |-
    {
      "nodePathMap": [
        {
          "node": "monolith",
          "paths": [
            "/opt/local-path-provisioner",
            "/mnt/k8s-worker",
            "/mnt/lab-backups/music-library"
          ]
        }
      ]
    }