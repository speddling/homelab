apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: fast
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-music
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: tunes
  resources:
    requests:
      storage: 800Gi